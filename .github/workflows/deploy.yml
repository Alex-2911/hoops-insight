name: Build and Deploy (Stats Dashboard)

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 17:00 UTC (18:00 Berlin wintertime / 19:00 summertime)
    - cron: "0 18 * * *"

permissions:
  contents: read
  actions: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # GitHub Pages base path for Vite build
      BASE_URL: /hoops-insight/

      # Cross-repo Basketball_prediction settings
      BP_OWNER: "Alex-2911"
      BP_REPO: "Basketball_prediction"
      BP_BRANCH: "2026"
      BP_WORKFLOW_FILE: "1_get_data_previous_game_day_2026.yml"

      # Optional
      N_WINDOW: "200"

    steps:
      - name: Checkout hoops-insight repo
        uses: actions/checkout@v4

      - name: Install jq (needed for workflow status polling)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Trigger Basketball_prediction pipeline
        shell: bash
        env:
          BP_TOKEN: ${{ secrets.BP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BP_TOKEN:-}" ]]; then
            echo "ERROR: secrets.BP_TOKEN is required to trigger cross-repo workflow."
            exit 1
          fi

          echo "Triggering workflow '$BP_WORKFLOW_FILE' in $BP_OWNER/$BP_REPO on ref=$BP_BRANCH"
          WF_ENC="${BP_WORKFLOW_FILE// /%20}"

          curl -fLsS -X POST \
            -H "Authorization: Bearer $BP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"ref\":\"$BP_BRANCH\"}" \
            "https://api.github.com/repos/$BP_OWNER/$BP_REPO/actions/workflows/$WF_ENC/dispatches"

          echo "✔ Triggered."

      - name: Wait for Basketball_prediction run to succeed
        shell: bash
        env:
          BP_TOKEN: ${{ secrets.BP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BP_TOKEN:-}" ]]; then
            echo "ERROR: secrets.BP_TOKEN is required to query cross-repo workflow status."
            exit 1
          fi

          echo "Waiting for workflow '$BP_WORKFLOW_FILE' on ref=$BP_BRANCH to complete successfully..."
          WF_ENC="${BP_WORKFLOW_FILE// /%20}"

          # 60 attempts x 10s = 10 minutes
          for i in {1..60}; do
            RUN_JSON="$(curl -fsS \
              -H "Authorization: Bearer $BP_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$BP_OWNER/$BP_REPO/actions/workflows/$WF_ENC/runs?branch=$BP_BRANCH&per_page=1")"

            ID="$(echo "$RUN_JSON" | jq -r '.workflow_runs[0].id // empty')"
            STATUS="$(echo "$RUN_JSON" | jq -r '.workflow_runs[0].status // empty')"
            CONCLUSION="$(echo "$RUN_JSON" | jq -r '.workflow_runs[0].conclusion // empty')"

            echo "Attempt $i → RunID=${ID:-n/a} | status=${STATUS:-n/a} | conclusion=${CONCLUSION:-n/a}"

            if [[ "${STATUS:-}" == "completed" && "${CONCLUSION:-}" == "success" ]]; then
              echo "✔ Latest Basketball_prediction run succeeded!"
              exit 0
            fi

            echo "Not successful yet — waiting 10s..."
            sleep 10
          done

          echo "✖ Workflow did not succeed in time."
          exit 1

      - name: Checkout Basketball_prediction repo (branch 2026)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BP_OWNER }}/${{ env.BP_REPO }}
          ref: ${{ env.BP_BRANCH }}
          path: Basketball_prediction
          fetch-depth: 1
          token: ${{ secrets.BP_TOKEN }}

      - name: Verify Basketball_prediction repo is fresh
        shell: bash
        run: |
          set -euo pipefail
          echo "BP ref info:"
          git -C Basketball_prediction branch --show-current
          git -C Basketball_prediction rev-parse HEAD
          git -C Basketball_prediction log -1 --oneline

      - name: Copy custom predictions (optional)
        shell: bash
        run: |
          set -euo pipefail
          CUSTOM_FILE="$GITHUB_WORKSPACE/nba_games_predict_2025-01-05.csv"
          TARGET_DIR="$GITHUB_WORKSPACE/Basketball_prediction/2026/output/LightGBM/Kelly"
          TARGET_NAME="combined_nba_predictions_iso_2025-01-05.csv"
          if [[ -f "$CUSTOM_FILE" ]]; then
            mkdir -p "$TARGET_DIR"
            cp "$CUSTOM_FILE" "$TARGET_DIR/$TARGET_NAME"
            ln -sf "$TARGET_NAME" "$TARGET_DIR/combined_latest.csv"
            echo "✔ Copied custom predictions to $TARGET_DIR/$TARGET_NAME"
          else
            echo "ℹ No custom prediction file found at $CUSTOM_FILE; skipping."
          fi

      - name: Verify required Basketball_prediction outputs exist
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE/Basketball_prediction/2026/output/LightGBM"
          KELLY_ROOT="$ROOT/Kelly"

          test -d "$ROOT" || (echo "ERROR: missing directory: $ROOT" && exit 1)
          test -d "$KELLY_ROOT" || (echo "ERROR: missing directory: $KELLY_ROOT" && exit 1)

          METRICS="$ROOT/metrics_snapshot.json"
          STRATEGY_TXT="$ROOT/strategy_params.txt"

          [[ -f "$METRICS" ]] || (echo "ERROR: missing $METRICS" && exit 1)
          [[ -f "$STRATEGY_TXT" ]] || (echo "ERROR: missing $STRATEGY_TXT" && exit 1)

          COMBINED_ACC="$(find "$ROOT" -maxdepth 1 -name "combined_nba_predictions_acc_*.csv" -type f -printf "%T@ %p\n" | sort -n | tail -n1 | cut -d' ' -f2- || true)"
          [[ -n "${COMBINED_ACC:-}" ]] || (echo "ERROR: no combined_nba_predictions_acc_*.csv under $ROOT" && exit 1)
          COMBINED_ISO="$(find "$KELLY_ROOT" -maxdepth 1 -name "combined_nba_predictions_iso_*.csv" -type f -printf "%T@ %p\n" | sort -n | tail -n1 | cut -d' ' -f2- || true)"
          [[ -n "${COMBINED_ISO:-}" ]] || (echo "ERROR: no combined_nba_predictions_iso_*.csv under $KELLY_ROOT" && exit 1)

          LOCAL_MATCHED="$(find "$ROOT" -maxdepth 1 -name "local_matched_games_*.csv" -type f -printf "%T@ %p\n" | sort -n | tail -n1 | cut -d' ' -f2- || true)"
          [[ -n "${LOCAL_MATCHED:-}" ]] || (echo "ERROR: no local_matched_games_*.csv under $ROOT" && exit 1)

          echo "✔ Found metrics_snapshot: $METRICS"
          echo "✔ Found strategy_params.txt: $STRATEGY_TXT"
          echo "✔ Found combined (ACC): $COMBINED_ACC"
          echo "✔ Found combined (ISO): $COMBINED_ISO"
          echo "✔ Found local_matched (dated): $LOCAL_MATCHED"

      - name: Copy dashboard sources into public/data (single snapshot only)
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$GITHUB_WORKSPACE/Basketball_prediction/2026/output/LightGBM"
          KELLY_ROOT="$ROOT/Kelly"
          OUT="$GITHUB_WORKSPACE/public/data"
          mkdir -p "$OUT"

          COMBINED_ISO="$(find "$KELLY_ROOT" -maxdepth 1 -name "combined_nba_predictions_iso_*.csv" -type f -printf "%p\n" | sort || true)"
          COMBINED_ACC="$(find "$ROOT" -maxdepth 1 -name "combined_nba_predictions_acc_*.csv" -type f -printf "%p\n" | sort || true)"
          BET_LOG_FLAT="$ROOT/bet_log_flat_live.csv"

          python - "$ROOT" "$KELLY_ROOT" "$OUT" <<'PY'
          import json
          import re
          import shutil
          import sys
          from pathlib import Path

          root = Path(sys.argv[1])
          kelly = Path(sys.argv[2])
          out = Path(sys.argv[3])

          def extract_date(name: str) -> str | None:
              m = re.search(r"(\d{4}-\d{2}-\d{2})", name)
              return m.group(1) if m else None

          def latest_dated(pattern: str, base: Path) -> tuple[str, Path] | None:
              candidates = []
              for p in base.glob(pattern):
                  dt = extract_date(p.name)
                  if dt:
                      candidates.append((dt, p))
              if not candidates:
                  return None
              return sorted(candidates, key=lambda x: x[0])[-1]

          def read_json_date(path: Path) -> str | None:
              if not path.exists():
                  return None
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return None
              for key in ("as_of_date", "asOfDate", "snapshot_as_of_date", "window_end"):
                  value = payload.get(key) if isinstance(payload, dict) else None
                  if isinstance(value, str) and re.fullmatch(r"\d{4}-\d{2}-\d{2}", value):
                      return value
              return None

          # Canonical snapshot date comes from combined file (ISO preferred, ACC fallback)
          combined_candidate = latest_dated("combined_nba_predictions_iso_*.csv", kelly)
          if combined_candidate is None:
              combined_candidate = latest_dated("combined_nba_predictions_acc_*.csv", root)
          if combined_candidate is None:
              raise SystemExit("ERROR: No dated combined predictions file found.")

          snapshot_date, combined_path = combined_candidate

          local_matched = root / f"local_matched_games_{snapshot_date}.csv"
          if not local_matched.exists():
              raise SystemExit(
                  f"ERROR: Inconsistent snapshot. Missing local_matched_games_{snapshot_date}.csv for {combined_path.name}."
              )

          strategy_candidates = [
              root / f"strategy_params_{snapshot_date}.json",
              root / f"strategy_params_{snapshot_date}.txt",
              root / "strategy_params.json",
              root / "strategy_params.txt",
          ]
          strategy_path = next((p for p in strategy_candidates if p.exists()), None)
          if strategy_path is None:
              raise SystemExit(f"ERROR: No strategy params file found for snapshot {snapshot_date}.")
          if strategy_path.name in {"strategy_params.json", "metrics_snapshot.json"}:
              strategy_date = read_json_date(strategy_path)
              if strategy_date and strategy_date != snapshot_date:
                  raise SystemExit(
                      f"ERROR: strategy_params.json date {strategy_date} does not match snapshot {snapshot_date}."
                  )

          metrics_candidates = [root / f"metrics_snapshot_{snapshot_date}.json", root / "metrics_snapshot.json"]
          metrics_path = next((p for p in metrics_candidates if p.exists()), None)
          if metrics_path is None:
              raise SystemExit(f"ERROR: No metrics snapshot file found for snapshot {snapshot_date}.")
          metrics_date = read_json_date(metrics_path)
          if metrics_date and metrics_date != snapshot_date:
              raise SystemExit(
                  f"ERROR: metrics snapshot date {metrics_date} does not match canonical snapshot {snapshot_date}."
              )

          shutil.copy2(combined_path, out / "combined_latest.csv")
          shutil.copy2(combined_path, out / combined_path.name)
          shutil.copy2(local_matched, out / "local_matched_games_latest.csv")
          shutil.copy2(strategy_path, out / "strategy_params.json")
          shutil.copy2(metrics_path, out / "metrics_snapshot.json")

          print(f"✔ Canonical snapshot_as_of_date: {snapshot_date}")
          print(f"✔ combined source: {combined_path}")
          print(f"✔ local_matched source: {local_matched}")
          print(f"✔ strategy_params source: {strategy_path}")
          print(f"✔ metrics source: {metrics_path}")
          print(f"  local_matched rows: {sum(1 for _ in (out / 'local_matched_games_latest.csv').open(encoding='utf-8')) - 1}")
          PY

          # Bring back Placed Bets (Real)
          if [[ -f "$BET_LOG_FLAT" ]]; then
            cp "$BET_LOG_FLAT" "$OUT/bet_log_flat_live.csv"
            echo "✔ Updated bet_log_flat_live.csv from Basketball_prediction."
            echo "  Rows: $(($(wc -l < "$OUT/bet_log_flat_live.csv") - 1)) (excluding header)"
          else
            echo "⚠ No bet_log_flat_live.csv found in Basketball_prediction output; Placed Bets may show 0."
          fi

          echo "✔ public/data contents:"
          ls -la "$OUT"

      - name: Ensure strategy_params.json exists
        shell: bash
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/public/data"

          if [[ ! -f "$OUT/strategy_params.json" ]]; then
            echo "ERROR: strategy_params.json missing (must be synced from Basketball_prediction)."
            exit 1
          fi

      - name: Setup Python 3.11 with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps (hoops-insight)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt in hoops-insight; skipping."
          fi

      - name: Generate dashboard data from public/data
        shell: bash
        run: |
          set -euo pipefail
          test -f public/data/metrics_snapshot.json
          test -f public/data/combined_latest.csv
          test -f public/data/local_matched_games_latest.csv
          python scripts/generate_dashboard_data.py --data-dir "$GITHUB_WORKSPACE/public/data"

      - name: Prepare dashboard data files
        shell: bash
        run: |
          set -euo pipefail
          DATA_DIR="$GITHUB_WORKSPACE/public/data"
          mkdir -p "$DATA_DIR"

          # Correct legacy typo files if they exist.
          if [[ -f "$DATA_DIR/dashoard_payload.json" ]]; then
            mv "$DATA_DIR/dashoard_payload.json" "$DATA_DIR/dashboard_payload.json"
          fi
          if [[ -f "$DATA_DIR/dashoard_state.json" ]]; then
            mv "$DATA_DIR/dashoard_state.json" "$DATA_DIR/dashboard_state.json"
          fi
          if [[ -f "$GITHUB_WORKSPACE/dashoard_payload.json" ]]; then
            mv "$GITHUB_WORKSPACE/dashoard_payload.json" "$DATA_DIR/dashboard_payload.json"
          fi
          if [[ -f "$GITHUB_WORKSPACE/dashoard_state.json" ]]; then
            mv "$GITHUB_WORKSPACE/dashoard_state.json" "$DATA_DIR/dashboard_state.json"
          fi

          # Move dashboard artifacts from repo root into public/data when needed.
          for file in dashboard_payload.json dashboard_state.json tables.json last_run.json summary.json; do
            if [[ -f "$GITHUB_WORKSPACE/$file" ]]; then
              mv "$GITHUB_WORKSPACE/$file" "$DATA_DIR/$file"
            fi
          done

          # Verify required files exist for runtime and build copy to dist/data.
          for file in dashboard_payload.json dashboard_state.json tables.json; do
            if [[ ! -f "$DATA_DIR/$file" ]]; then
              echo "ERROR: missing $file after relocation" >&2
              exit 1
            fi
          done

          echo "✔ Dashboard JSON files prepared in public/data."

      - name: Validate dashboard payload
        shell: bash
        run: |
          set -euo pipefail
          test -f public/data/dashboard_payload.json
          python scripts/validate_dashboard_payload.py --path public/data/dashboard_payload.json

      - name: Validate dashboard state
        shell: bash
        run: |
          set -euo pipefail
          test -f public/data/dashboard_state.json
          node scripts/validate_dashboard_state.mjs public/data

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps & build
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build -- --base="$BASE_URL"
          cp dist/index.html dist/404.html
          echo "✔ Dashboard build finished."

      - name: Verify build output and base path
        shell: bash
        run: |
          set -euo pipefail
          [[ -d dist/assets ]] || (echo "ERROR: Missing dist/assets output." && exit 1)
          grep -n "$BASE_URL" dist/index.html >/dev/null || (echo "ERROR: BASE_URL not found in dist/index.html" && exit 1)
          for file in dashboard_payload.json dashboard_state.json tables.json; do
            [[ -f "dist/data/$file" ]] || (echo "ERROR: Missing dist/data/$file in build output." && exit 1)
          done
          echo "✔ Build output verified for GitHub Pages base path."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
