name: Build and Deploy (Stats Dashboard)

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 17:00 UTC (18:00 Berlin wintertime / 19:00 summertime)
    - cron: "0 18 * * *"

permissions:
  contents: read
  actions: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # GitHub Pages base path for Vite build
      BASE_URL: /hoops-insight/

      # Cross-repo Basketball_prediction settings
      BP_OWNER: "Alex-2911"
      BP_REPO: "Basketball_prediction"
      BP_BRANCH: "2026"
      BP_WORKFLOW_FILE: "1_get_data_previous_game_day_2026.yml"

      # Optional
      N_WINDOW: "200"

    steps:
      - name: Checkout hoops-insight repo
        uses: actions/checkout@v4

      - name: Install jq (needed for workflow status polling)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Trigger Basketball_prediction pipeline
        shell: bash
        env:
          BP_TOKEN: ${{ secrets.BP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BP_TOKEN:-}" ]]; then
            echo "ERROR: secrets.BP_TOKEN is required to trigger cross-repo workflow."
            exit 1
          fi

          echo "Triggering workflow '$BP_WORKFLOW_FILE' in $BP_OWNER/$BP_REPO on ref=$BP_BRANCH"
          WF_ENC="${BP_WORKFLOW_FILE// /%20}"

          curl -fLsS -X POST \
            -H "Authorization: Bearer $BP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"ref\":\"$BP_BRANCH\"}" \
            "https://api.github.com/repos/$BP_OWNER/$BP_REPO/actions/workflows/$WF_ENC/dispatches"

          echo "✔ Triggered."

      - name: Wait for Basketball_prediction run to succeed
        shell: bash
        env:
          BP_TOKEN: ${{ secrets.BP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BP_TOKEN:-}" ]]; then
            echo "ERROR: secrets.BP_TOKEN is required to query cross-repo workflow status."
            exit 1
          fi

          echo "Waiting for workflow '$BP_WORKFLOW_FILE' on ref=$BP_BRANCH to complete successfully..."
          WF_ENC="${BP_WORKFLOW_FILE// /%20}"

          # 60 attempts x 10s = 10 minutes
          for i in {1..60}; do
            RUN_JSON="$(curl -fsS \
              -H "Authorization: Bearer $BP_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$BP_OWNER/$BP_REPO/actions/workflows/$WF_ENC/runs?branch=$BP_BRANCH&per_page=1")"

            ID="$(echo "$RUN_JSON" | jq -r '.workflow_runs[0].id // empty')"
            STATUS="$(echo "$RUN_JSON" | jq -r '.workflow_runs[0].status // empty')"
            CONCLUSION="$(echo "$RUN_JSON" | jq -r '.workflow_runs[0].conclusion // empty')"

            echo "Attempt $i → RunID=${ID:-n/a} | status=${STATUS:-n/a} | conclusion=${CONCLUSION:-n/a}"

            if [[ "${STATUS:-}" == "completed" && "${CONCLUSION:-}" == "success" ]]; then
              echo "✔ Latest Basketball_prediction run succeeded!"
              exit 0
            fi

            echo "Not successful yet — waiting 10s..."
            sleep 10
          done

          echo "✖ Workflow did not succeed in time."
          exit 1

      - name: Checkout Basketball_prediction repo (branch 2026)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BP_OWNER }}/${{ env.BP_REPO }}
          ref: ${{ env.BP_BRANCH }}
          path: Basketball_prediction
          fetch-depth: 1
          token: ${{ secrets.BP_TOKEN }}

      - name: Verify Basketball_prediction repo is fresh
        shell: bash
        run: |
          set -euo pipefail
          echo "BP ref info:"
          git -C Basketball_prediction branch --show-current
          git -C Basketball_prediction rev-parse HEAD
          git -C Basketball_prediction log -1 --oneline

      - name: Copy custom predictions (optional)
        shell: bash
        run: |
          set -euo pipefail
          CUSTOM_FILE="$GITHUB_WORKSPACE/nba_games_predict_2025-01-05.csv"
          TARGET_DIR="$GITHUB_WORKSPACE/Basketball_prediction/2026/output/LightGBM/Kelly"
          TARGET_NAME="combined_nba_predictions_iso_2025-01-05.csv"
          if [[ -f "$CUSTOM_FILE" ]]; then
            mkdir -p "$TARGET_DIR"
            cp "$CUSTOM_FILE" "$TARGET_DIR/$TARGET_NAME"
            ln -sf "$TARGET_NAME" "$TARGET_DIR/combined_latest.csv"
            echo "✔ Copied custom predictions to $TARGET_DIR/$TARGET_NAME"
          else
            echo "ℹ No custom prediction file found at $CUSTOM_FILE; skipping."
          fi

      - name: Verify required Basketball_prediction output directories exist
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE/Basketball_prediction/2026/output/LightGBM"
          KELLY_ROOT="$ROOT/Kelly"
          test -d "$ROOT" || (echo "ERROR: missing directory: $ROOT" && exit 1)
          test -d "$KELLY_ROOT" || (echo "ERROR: missing directory: $KELLY_ROOT" && exit 1)
          echo "✔ Basketball_prediction output directories exist."

      - name: Setup Python 3.11 with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps (hoops-insight)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt in hoops-insight; skipping."
          fi

      - name: Materialize dated snapshot artifacts and list availability
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ensure_historical_snapshot_artifacts.py --source-root "$GITHUB_WORKSPACE/Basketball_prediction/2026"

      - name: Generate dashboard data via shared snapshot selection
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_dashboard_data.py --source-root "$GITHUB_WORKSPACE/Basketball_prediction/2026"

      - name: Prepare dashboard data files
        shell: bash
        run: |
          set -euo pipefail
          DATA_DIR="$GITHUB_WORKSPACE/public/data"
          mkdir -p "$DATA_DIR"

          # Correct legacy typo files if they exist.
          if [[ -f "$DATA_DIR/dashoard_payload.json" ]]; then
            mv "$DATA_DIR/dashoard_payload.json" "$DATA_DIR/dashboard_payload.json"
          fi
          if [[ -f "$DATA_DIR/dashoard_state.json" ]]; then
            mv "$DATA_DIR/dashoard_state.json" "$DATA_DIR/dashboard_state.json"
          fi
          if [[ -f "$GITHUB_WORKSPACE/dashoard_payload.json" ]]; then
            mv "$GITHUB_WORKSPACE/dashoard_payload.json" "$DATA_DIR/dashboard_payload.json"
          fi
          if [[ -f "$GITHUB_WORKSPACE/dashoard_state.json" ]]; then
            mv "$GITHUB_WORKSPACE/dashoard_state.json" "$DATA_DIR/dashboard_state.json"
          fi

          # Move dashboard artifacts from repo root into public/data when needed.
          for file in dashboard_payload.json dashboard_state.json tables.json last_run.json summary.json; do
            if [[ -f "$GITHUB_WORKSPACE/$file" ]]; then
              mv "$GITHUB_WORKSPACE/$file" "$DATA_DIR/$file"
            fi
          done

          # Verify required files exist for runtime and build copy to dist/data.
          for file in dashboard_payload.json dashboard_state.json tables.json; do
            if [[ ! -f "$DATA_DIR/$file" ]]; then
              echo "ERROR: missing $file after relocation" >&2
              exit 1
            fi
          done

          echo "✔ Dashboard JSON files prepared in public/data."

      - name: Validate dashboard payload
        shell: bash
        run: |
          set -euo pipefail
          test -f public/data/dashboard_payload.json
          python scripts/validate_dashboard_payload.py --path public/data/dashboard_payload.json

      - name: Validate dashboard state
        shell: bash
        run: |
          set -euo pipefail
          test -f public/data/dashboard_state.json
          node scripts/validate_dashboard_state.mjs public/data

      - name: Validate snapshot metadata consistency
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          state = json.loads(Path("public/data/dashboard_state.json").read_text(encoding="utf-8"))
          last_run = json.loads(Path("public/data/last_run.json").read_text(encoding="utf-8"))

          required = [
              "snapshot_as_of_date",
              "run_date",
              "combined_source_file",
              "local_matched_source_file",
              "bet_log_source_file",
              "strategy_params_source_file",
              "metrics_snapshot_source_file",
          ]
          missing = [key for key in required if not state.get(key)]
          if missing:
              raise SystemExit(f"ERROR: dashboard_state missing required fields: {', '.join(missing)}")
          if state.get("data_consistency_status") != "ok":
              issues = state.get("data_consistency_issues", [])
              print(f"WARNING: data_consistency_status={state.get('data_consistency_status')} issues={issues}")
          selection = last_run.get("selection", {})
          if selection.get("snapshot_as_of_date") != state.get("snapshot_as_of_date"):
              raise SystemExit("ERROR: last_run.selection snapshot does not match dashboard_state snapshot.")
          print("✔ Snapshot metadata consistency validated.")
          PY

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps & build
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build -- --base="$BASE_URL"
          cp dist/index.html dist/404.html
          echo "✔ Dashboard build finished."

      - name: Verify build output and base path
        shell: bash
        run: |
          set -euo pipefail
          [[ -d dist/assets ]] || (echo "ERROR: Missing dist/assets output." && exit 1)
          grep -n "$BASE_URL" dist/index.html >/dev/null || (echo "ERROR: BASE_URL not found in dist/index.html" && exit 1)
          for file in dashboard_payload.json dashboard_state.json tables.json; do
            [[ -f "dist/data/$file" ]] || (echo "ERROR: Missing dist/data/$file in build output." && exit 1)
          done
          echo "✔ Build output verified for GitHub Pages base path."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
